# ============================================================
# TOOLS — Which tool for which task
# ============================================================
tools:
  description: "Codex has several built-in tools it uses automatically. You do not need to tell it which one to use — it decides based on your request."
  tool_list:
    file_read: "When Codex needs to look at a file"
    file_write: "When Codex creates a new file from scratch"
    file_edit: "When Codex changes part of an existing file"
    search: "When Codex needs to find something in the project"
    terminal: "When Codex needs to run a command (build, test, install)"
    web_search: "When Codex needs to look something up online"
    js_repl: "When Codex needs to run JavaScript to test something"
  guidance:
    read_before_edit: "Codex always reads a file before changing it"
    prefer_edit: "Small changes use edit (surgical), big rewrites use write"
    terminal_for_verification: "Codex runs commands to verify its changes work"
    search_for_discovery: "Codex searches when it needs to find the right file"

# ============================================================
# ANTI-PATTERNS — Things to avoid
# ============================================================
dont:
  - "Do not paste passwords, API keys, or secrets into Codex"
  - "Do not ignore context warnings — if Codex says it is running low, use /compact"
  - "Do not skip reviewing changes — always look at diffs before accepting"
  - "Do not write vague prompts like 'fix everything' for complex tasks"
  - "Do not keep working when context is in the red zone — start fresh"
  - "Do not use --yolo or danger-full-access in projects you do not fully trust"
  - "Do not install MCP servers from unknown sources without reviewing them"
  - "Do not assume Codex remembers previous sessions — it starts fresh each time"
  - "Do not paste entire large files when Codex can read them with @mention"
  - "Do not fight the AI — if it keeps misunderstanding, rephrase or start over"
  - "Do not skip AGENTS.md — it saves you from repeating instructions every session"
  - "Do not run Codex on production systems without sandbox protection"

