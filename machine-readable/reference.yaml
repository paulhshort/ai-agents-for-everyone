# ============================================================
# DECISION TREE — Quick routing for common situations
# ============================================================
decide:
  simple_task: "Just type what you want in plain English — Codex will do it"
  complex_task: "Use /plan to have Codex think it through before acting"
  context_high: "/compact to compress your conversation, or /clear for a fresh start"
  repeating_task: "Create a custom agent or skill so you can reuse it"
  need_external_data: "Add an MCP server to give Codex access to external tools"
  deep_debug: "Provide the full error message and let Codex investigate"
  security_concern: "Check your sandbox mode and review permission settings"
  new_project: "Run /init to set up AGENTS.md with project instructions"
  team_setup: "Create a shared .codex/config.toml in the project repo"
  slow_responses: "Switch to GPT-5.4-mini with /model or --model flag"
  lost_context: "Start a fresh session — Codex works best with clean context"
  want_to_learn: "Use the onboarding prompt for a personalized guided tour"

# ============================================================
# PROMPT FORMULA
# ============================================================
prompt_formula:
  structure: "WHAT + WHERE + HOW + VERIFY"
  description: "The 4-part formula for getting great results from Codex"
  parts:
    what: "What do you want done? Be specific about the outcome."
    where: "Where in the project? Name the file or folder."
    how: "Any constraints or preferences for how it should be done."
    verify: "How should Codex confirm it worked? Tests? Output?"
  example:
    what: "Add input validation"
    where: "in src/api/auth.ts, the login() function"
    how: "using zod schema, reject empty strings"
    verify: "existing tests still pass, add test for empty input"
  simple_example:
    what: "Fix the broken login button"
    where: "in the main page"
    how: "it should redirect to the dashboard after login"
    verify: "try clicking it and confirm it works"

# ============================================================
# STANDARD WORKFLOW (9 steps)
# ============================================================
workflow:
  description: "The recommended way to work with Codex on any task"
  steps:
    1: "Open your project folder in the terminal"
    2: "Start a Codex session by typing 'codex'"
    3: "Describe your task using the WHAT + WHERE + HOW + VERIFY formula"
    4: "Review the plan Codex proposes"
    5: "Approve the plan or ask for changes"
    6: "Review the changes Codex made (the 'diff')"
    7: "Accept the changes if they look right"
    8: "Verify the result works as expected"
    9: "Save your work (commit) if you are satisfied"

# ============================================================
# COMMANDS — All slash commands
# ============================================================
commands:
  /clear: "Wipe the conversation and start fresh — like opening a new chat"
  /compact: "Compress the conversation to free up space without losing important context"
  /diff: "Show what Codex has changed in your files"
  /model: "Switch to a different AI model mid-conversation"
  /plan: "Ask Codex to think through a task and show you its plan before acting"
  /status: "See how much context space is used and current session info"
  /review: "Have Codex review code changes or a pull request"
  /init: "Set up a new project with an AGENTS.md file for project instructions"
  /permissions: "View or change what Codex is allowed to do"
  /mcp: "Manage MCP server connections"
  /mention: "Bring a specific file into the conversation"
  /fork: "Split the current conversation into a new branch"
  /resume: "Continue a previous session where you left off"
  /new: "Start a brand new conversation"
  /personality: "Change how Codex communicates (formal, casual, etc.)"
  /theme: "Change the visual appearance of the terminal interface"
  /ps: "Show running background processes"
  /agent: "Launch or manage sub-agents for parallel work"
  /apps: "List available applications and integrations"
  /fast: "Toggle fast mode for quicker responses with less detail"

# ============================================================
# SHORTCUTS — Keyboard shortcuts
# ============================================================
shortcuts:
  "Ctrl+C": "Stop what Codex is currently doing — like pressing the pause button"
  "Ctrl+G": "Submit your message (alternative to pressing Enter)"
  "Esc Esc": "Press Escape twice to cancel the current input"
  "@": "Mention a file to bring it into the conversation"
  "!": "Run a shell command directly"
  "$": "Reference an environment variable"

# ============================================================
# CLI FLAGS — Command-line options
# ============================================================
cli:
  "--model": "Choose which AI model to use (e.g., --model gpt-5.4-mini)"
  "--full-auto": "Let Codex work without asking for approval on each step"
  "--sandbox": "Set the safety level (read-only, workspace-write, danger-full-access)"
  "--search": "Enable or configure web search (disabled, cached, live)"
  "--profile": "Load a named configuration profile"
  "--config": "Point to a specific configuration file"
  "--image": "Include an image file for Codex to analyze"
  "--cd": "Change to a specific directory before starting"
  "--add-dir": "Add extra directories for Codex to access"
  "--oss": "Run in open-source mode"
  "--yolo": "Full auto with no safety guardrails — use with extreme caution"

# ============================================================
# CONTEXT MANAGEMENT
# ============================================================
context:
  description: "Context is the AI's memory during a conversation. Managing it well is key to good results."
  zones:
    green: "0-50% used — Plenty of room. Work freely."
    yellow: "50-70% used — Getting full. Be mindful of pasting large files."
    orange: "70-85% used — Running low. Use /compact soon."
    red: "85-100% used — Almost out. Use /compact now or start fresh with /clear."
  fresh_context: "Start a new session for each distinct task — Codex works best with clean, focused context."
  symptoms:
    slow_responses: "Context is too large — use /compact to free up space"
    hallucinations: "Stale or conflicting context — use /clear for a fresh start"
    wrong_files: "Context pollution from earlier work — start a fresh session"
    repetitive_answers: "Codex is going in circles — rephrase your question or /clear"
    ignoring_instructions: "Too much noise in context — use /compact or simplify your request"

# ============================================================
# PROJECT INSTRUCTIONS (AGENTS.md)
# ============================================================
memory:
  description: "AGENTS.md is like a briefing document you give Codex before each session. It tells Codex about your project."
  locations:
    - path: "AGENTS.md"
      scope: "Project root — main project instructions"
      priority: 1
    - path: ".codex/config.toml"
      scope: "Project-level configuration"
      priority: 2
    - path: "~/.codex/config.toml"
      scope: "Your personal global settings"
      priority: 3
    - path: "/etc/codex/config.toml"
      scope: "System-wide settings (set by admins)"
      priority: 4
  priority_order: "Project instructions override global, which override system"
  what_to_include:
    - "What the project does (a brief summary)"
    - "Which programming language and framework it uses"
    - "How to build and run the project"
    - "How to run tests"
    - "Any coding conventions or style rules"
    - "Things Codex should never do (restrictions)"

# ============================================================
# FOLDER STRUCTURE
# ============================================================
folder_structure:
  ".codex/":
    "config.toml": "Project-level configuration in TOML format"
    "hooks.json": "Custom hooks that run at specific events"
  ".agents/":
    "skills/": "Custom skills with SKILL.md files"
  "AGENTS.md": "Project instructions for Codex (at project root)"

# ============================================================
# PERMISSION / APPROVAL MODES
# ============================================================
permissions:
  description: "Approval modes control how much freedom Codex has to act on its own."
  modes:
    untrusted:
      description: "Maximum safety — Codex asks permission for everything"
      when_to_use: "Working in unfamiliar projects or sensitive codebases"
      risk: "Lowest"
    on_request:
      description: "Balanced — Codex asks before risky actions but handles safe ones automatically"
      when_to_use: "Everyday work in trusted projects"
      risk: "Low"
    never:
      description: "Codex never asks — it either acts or skips"
      when_to_use: "Automated pipelines and CI/CD"
      risk: "Medium"
  cli_overrides:
    "--full-auto": "Let Codex work through its plan without stopping to ask"
    "--yolo": "No guardrails at all — Codex does whatever it decides. Only use if you know what you are doing."
  sandbox_modes:
    "read-only": "Codex can look at files but cannot change anything — safest option"
    "workspace-write": "Codex can modify files in the project folder but nothing outside it"
    "danger-full-access": "Codex can modify anything on your system — use with extreme caution"

# ============================================================
# MCP SERVERS
# ============================================================
mcp:
  overview: "MCP (Model Context Protocol) lets you connect Codex to external tools and data sources — like giving it superpowers."
  description: "Think of MCP servers as plugins. Each one gives Codex a new ability, like searching the web, reading a database, or connecting to your project management tool."
  management:
    add: "codex mcp add <name> — Add a new MCP server"
    list: "codex mcp list — See all connected servers"
    get: "codex mcp get <name> — View details of a server"
    remove: "codex mcp remove <name> — Disconnect a server"
  config_location: "[mcp_servers] section in config.toml"
  server_types:
    http: "Connects to a web-based MCP server over HTTP"
    stdio: "Runs a local program that communicates through standard input/output"
  popular_servers:
    - name: "filesystem"
      purpose: "Enhanced file system access"
    - name: "github"
      purpose: "Interact with GitHub repos, issues, PRs"
    - name: "postgres"
      purpose: "Query PostgreSQL databases"
    - name: "brave-search"
      purpose: "Search the web using Brave"
  security_checklist:
    - "Only install MCP servers from trusted sources"
    - "Review what permissions each server requests"
    - "Use read-only servers when possible"
    - "Monitor server activity in logs"

# ============================================================
# ARCHITECTURE
# ============================================================
architecture:
  summary: "Codex is an AI agent that follows a loop: read the situation, make a plan, take action, check the result."
  master_loop: "Read -> Plan -> Act -> Verify"
  loop_explained:
    read: "Codex reads your files, your instructions, and your request"
    plan: "It figures out what steps to take"
    act: "It makes changes — editing files, running commands, searching"
    verify: "It checks that the changes work correctly"
  tools:
    file_read: "Look at file contents"
    file_write: "Create or replace files"
    file_edit: "Change specific parts of files"
    terminal: "Run commands in the terminal"
    search: "Find files or text in the project"
    web: "Look up information on the internet"
  context_budget: "Codex manages its memory automatically, but you can help by using /compact and starting fresh sessions"
  models:
    primary: "GPT-5.4 — Best quality, used by default"
    fast: "GPT-5.4-mini — Faster and lighter for simple tasks"
    legacy: "GPT-5.3-codex — Previous generation, still available"

