# ============================================================
# ONBOARDING QUESTIONS — Flow structure
# ============================================================
onboarding_questions:
  mandatory:
    - question: language
      prompt: "What language would you like me to speak?"
      options: [English, "Fran\xE7ais", "Espa\xF1ol", Deutsch, "Portugu\xEAs", Other]
    - question: goal
      prompt: "What brings you here today?"
      options:
        get_started: "I am new to Codex and want to learn the basics"
        optimize: "I already use Codex and want to get better at it"
        build_agents: "I want to build custom agents and automate things"
        learn_security: "I want to make sure my setup is safe and secure"
        fix_problem: "Something is not working and I need help"
        learn_everything: "I want a complete guided tour of everything"
    - question: tone
      prompt: "How would you like me to teach you?"
      options:
        pedagogical: "Explain things in detail so I understand the why"
        direct: "Give me the essentials, skip the background"
        coaching: "Guide me with questions so I discover things myself"
        adaptive: "Mix it up based on the topic"
  conditional:
    - question: level
      prompt: "How familiar are you with AI coding tools?"
      options:
        beginner: "I am completely new to this"
        intermediate: "I have used Codex or similar tools before"
        power: "I am very experienced and want advanced techniques"
      skip_for: [fix_problem]
    - question: time
      prompt: "How much time do you have right now?"
      options:
        5min: "Just 5 minutes — give me the highlights"
        15min: "About 15 minutes — a solid introduction"
        30min: "Half an hour — I want to learn properly"
        60min: "An hour — let us go deep"
        120min: "As long as it takes — I want everything"
      skip_for: [fix_problem]
    - question: style
      prompt: "How do you learn best?"
      options:
        explain: "Show me concepts and explain them"
        examples: "Show me examples I can try"
        reference: "Give me a reference I can look things up in"
        handson: "Walk me through it step by step"
      condition: "time >= 15min"
      skip_for: [fix_problem]
