  api_key_error: "Check that CODEX_API_KEY is set: echo $CODEX_API_KEY"
  codex_not_found: "Reinstall: npm install -g @openai/codex"
  permission_denied: "Check sandbox mode — you may need workspace-write or higher"
  mcp_not_connecting: "Run 'codex mcp list' to check status, try removing and re-adding"
  hooks_not_firing: "Verify .codex/hooks.json syntax and that codex_hooks feature flag is enabled"
  agent_not_working: "Check AGENTS.md syntax — it should be plain markdown with clear instructions"
  session_lost: "Use 'codex resume' to pick up where you left off"
  wrong_model: "Use /model to switch, or set default in ~/.codex/config.toml"
  codex_loops: "Codex is stuck in a loop — interrupt with Ctrl+C and rephrase your request"
  empty_responses: "Context may be corrupted — use /clear and try again"
  cant_find_files: "Use @mention to point Codex to the right file, or use --add-dir"

# ============================================================
# DEBUG TECHNIQUES
# ============================================================
debug:
  description: "When something is not working right, these techniques help you figure out what is going on."
  techniques:
    check_status: "Run /status to see context usage and session details"
    check_version: "Run codex --version to make sure you have the latest"
    verbose_mode: "Start with extra detail to see what Codex is doing internally"
    review_config: "Check your config files for typos or conflicting settings"
    test_simple: "Try a simple request first to rule out complex issues"
    check_network: "Make sure you have internet access — Codex needs to reach OpenAI servers"
    check_mcp: "Run codex mcp list to verify MCP server connections"
    read_logs: "Check terminal output for error messages"
    fresh_session: "Sometimes the fix is simply starting over with /clear"
    ask_community: "Post in the OpenAI community forum with your error message"

# ============================================================
# GOLDEN RULES
# ============================================================
rules:
  description: "Five simple rules that will make your Codex experience dramatically better."
  1:
    rule: "Always review changes before accepting"
    why: "Codex is powerful but not perfect — a quick review catches mistakes before they cause problems"
  2:
    rule: "Manage your context — use /compact before 70%"
    why: "A cluttered context makes Codex slower and less accurate, like trying to think in a noisy room"
  3:
    rule: "Be specific: use WHAT + WHERE + HOW + VERIFY"
    why: "Clear instructions get better results — just like giving directions to a person"
  4:
    rule: "Plan first for complex or risky tasks"
    why: "Use /plan to have Codex show you its approach before it starts making changes"
  5:
    rule: "Create AGENTS.md for every project"
    why: "Project instructions help Codex understand your project instantly instead of guessing"

# ============================================================
# AGENT TEMPLATE — AGENTS.md format
# ============================================================
agent_template:
  description: "AGENTS.md is a markdown file at the root of your project that tells Codex about your project."
  format: "Plain markdown"
  recommended_sections:
    - heading: "Project Overview"
      content: "A 1-2 sentence description of what the project does"
    - heading: "Tech Stack"
      content: "Languages, frameworks, and tools used"
    - heading: "Getting Started"
      content: "How to install dependencies and run the project"
    - heading: "Testing"
      content: "How to run tests"
    - heading: "Conventions"
      content: "Coding style, naming conventions, file organization"
    - heading: "Restrictions"
      content: "Things Codex should never do in this project"
  example: |
    # AGENTS.md

    ## Project Overview
    A web app for managing personal recipes, built with React and Node.js.

    ## Tech Stack
    - Frontend: React 18 with TypeScript
    - Backend: Node.js with Express
    - Database: PostgreSQL
    - Testing: Jest + React Testing Library

    ## Getting Started
    ```bash
    npm install
    npm run dev
    ```

    ## Testing
    ```bash
    npm test
    ```

    ## Conventions
    - Use TypeScript strict mode
    - Components in PascalCase
    - API routes in kebab-case
    - All new features need tests

    ## Restrictions
    - Never modify database migration files directly
    - Never commit .env files
    - Always use parameterized queries (no string concatenation for SQL)

# ============================================================
# HOOK EVENTS
# ============================================================
hook_events:
  description: "Hooks let you run custom code when specific things happen in Codex. They are defined in .codex/hooks.json."
  config_file: ".codex/hooks.json"
  events:
    SessionStart:
      when: "When a new Codex session begins"
      use_case: "Set up the environment, load project-specific tools"
    PreToolUse:
      when: "Just before Codex uses a tool (like editing a file)"
      use_case: "Validate or block certain actions, add logging"
    PostToolUse:
      when: "Right after Codex finishes using a tool"
      use_case: "Run linters, format code, send notifications"
    UserPromptSubmit:
      when: "When you submit a message to Codex"
      use_case: "Add standard context, validate inputs"
    Stop:
      when: "When a Codex session ends"
      use_case: "Clean up, generate reports, send summaries"

# ============================================================
# ECOSYSTEM — Guide positioning and resources
# ============================================================
ecosystem:
  guide:
    name: "The Ultimate OpenAI Codex Guide"
    url: "https://github.com/paulhdev/codex-ultimate-guide"
    audience: "Everyone — especially people new to AI and the agentic paradigm"
    mission: "Teach people that AI can DO things, not just answer questions"
  mcp_server:
    name: "codex-ultimate-guide-mcp"
    install: "npx -y codex-ultimate-guide-mcp"
    purpose: "Query the guide from any AI assistant without cloning the repo"
  complementary:
    - name: "OpenAI Codex Documentation"
      url: "https://openai.com/codex"
      what: "Official docs from OpenAI"
    - name: "OpenAI Cookbook"
      url: "https://cookbook.openai.com"
      what: "Code examples and tutorials"
    - name: "OpenAI Community Forum"
      url: "https://community.openai.com"
      what: "Ask questions, share tips, get help"
    - name: "MCP Specification"
      url: "https://modelcontextprotocol.io"
      what: "Technical details of the Model Context Protocol"

